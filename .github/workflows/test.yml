name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        working-directory: packages/llm-mock
        run: npm ci

      - name: Type check
        working-directory: packages/llm-mock
        run: npm run typecheck

      - name: Run tests
        working-directory: packages/llm-mock
        run: npm test

      - name: Build
        working-directory: packages/llm-mock
        run: npm run build
